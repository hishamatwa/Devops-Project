- name: Verify Voting App on Kubernetes
  hosts: local
  gather_facts: false
  vars:
    namespace: voting-app

  tasks:
    - name: Pods
      command: kubectl get pods -n {{ namespace }}
      changed_when: false

    - name: Services
      command: kubectl get svc -n {{ namespace }}
      changed_when: false

    - name: Endpoints (db + redis)
      command: kubectl get endpoints -n {{ namespace }} db redis -o wide
      changed_when: false
